services:

  backend:
    build: .
    image: pos-backend:latest
    container_name: pos-backend

    depends_on:
      mysql:
        condition: service_healthy

    ports:
      - "8080:8080"

    env_file:
      - .env

    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
